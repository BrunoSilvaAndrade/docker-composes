services:
  redis-cluster:
    image: docker.io/bitnamilegacy/redis-cluster:7.0
    container_name: redis-cluster
    environment:
      ALLOW_EMPTY_PASSWORD: true
      REDIS_NODES: localhost
    post_start:
      - command: bash -c 'while ! redis-cli ping; do sleep 1; done && redis-cli cluster info|egrep cluster_state:fail && yes yes|redis-cli --cluster fix 127.0.0.1 6379'
    healthcheck:
      test: ["CMD","bash", "-c", "redis-cli cluster info|egrep cluster_state:ok"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 3s
    ports:
      - "6379:6379"